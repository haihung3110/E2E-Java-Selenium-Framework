name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run E2E tests
        run: mvn clean test -Dbrowser=chrome -Dheadless=true -Denv=qa

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            reports/
            target/surefire-reports/
